# Synced Plugin Configuration
# Default values for sync toggles (can be overridden per-team via the GUI)

defaults:
  inventory-sync: true
  health-sync: true
  hunger-sync: true
  xp-sync: true
  potion-effects-sync: true
  ender-chest-sync: true
  position-sync: false

# Totem of Undying behaviour
# When false (default): the player who activates the totem is shielded from
#   syncing for 2 seconds. Teammates are completely unaffected — only the
#   totem holder benefits from it.
# When true: the 2-second sync shield is skipped, so the totem's recovery
#   effects (regen, absorption, fire resistance) propagate to all teammates
#   as normal health/effect sync events.
sync-totem-effects: false

